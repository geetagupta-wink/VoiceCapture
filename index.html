<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d12;
      --surface: #12161e;
      --surface2: #1a1f2b;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e8eaf0;
      --muted: #7a8195;
      --accent: #4f9eff;
      --success: #3ecf8e;
      --warn: #f5a623;
      --danger: #f06060;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-shell {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 4px;
    }

    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 100px;
      padding: 5px 14px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .status-pill.active { color: var(--success); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.07); }
    .status-pill.warn-state { color: var(--warn); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.07); }
    .status-pill.error-state { color: var(--danger); border-color: rgba(240,96,96,0.3); background: rgba(240,96,96,0.07); }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse-dot 1.2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .text-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .read-text {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      line-height: 1.7;
      color: var(--text);
    }

    .read-text span.word { display: inline; transition: color 0.3s, opacity 0.3s; }
    .read-text span.word.done { color: var(--muted); opacity: 0.45; }
    .read-text span.word.current {
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
    }

    .visualizer-card {
      position: relative;
      height: 100px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    canvas#waveCanvas { width: 100%; height: 84px; display: block; }

    .vad-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      color: var(--muted);
      transition: all 0.3s;
    }
    .vad-badge.voice { color: var(--success); border-color: rgba(62,207,142,0.4); background: rgba(62,207,142,0.1); }
    .vad-badge.noise { color: var(--warn); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.08); }

    .progress-section { display: flex; flex-direction: column; gap: 16px; }
    .progress-row { display: flex; flex-direction: column; gap: 7px; }
    .progress-labels { display: flex; justify-content: space-between; align-items: baseline; }
    .progress-label { font-size: 12px; color: var(--muted); letter-spacing: 0.2px; }
    .progress-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }

    .track { height: 6px; background: var(--surface2); border-radius: 100px; border: 0.5px solid var(--border); overflow: hidden; }
    .fill { height: 100%; border-radius: 100px; transition: width 0.3s ease, background 0.4s; }
    .fill-voice { background: var(--success); }
    .fill-time { background: var(--accent); }
    .fill-time.warn { background: var(--warn); }
    .fill-time.crit { background: var(--danger); }

    .segments-row { display: flex; gap: 3px; height: 18px; align-items: flex-end; }
    .seg-bar { flex: 1; border-radius: 3px; transition: height 0.15s, background 0.3s; min-height: 3px; }
    .seg-bar.voice-seg { background: var(--success); }
    .seg-bar.noise-seg { background: rgba(245,166,35,0.5); }
    .seg-bar.silent-seg { background: var(--surface2); border: 0.5px solid var(--border); }

    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .metric-box {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .metric-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
    .metric-val.good { color: var(--success); }
    .metric-val.warn { color: var(--warn); }
    .metric-val.bad { color: var(--danger); }

    .alert-box {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    .alert-box.hidden { display: none; }
    .alert-box.info { background: rgba(79,158,255,0.1); border: 0.5px solid rgba(79,158,255,0.3); color: #a0c8ff; }
    .alert-box.warn { background: rgba(245,166,35,0.1); border: 0.5px solid rgba(245,166,35,0.3); color: #f5c87a; }
    .alert-box.success { background: rgba(62,207,142,0.1); border: 0.5px solid rgba(62,207,142,0.3); color: #7ef5c0; }
    .alert-box.error { background: rgba(240,96,96,0.1); border: 0.5px solid rgba(240,96,96,0.3); color: #f5a0a0; }

    .controls { display: flex; gap: 12px; align-items: center; }

    .btn-primary {
      flex: 1; height: 52px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: #6aadff; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary.recording { background: var(--danger); animation: btn-glow 1.5s infinite; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    @keyframes btn-glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(240,96,96,0); }
      50% { box-shadow: 0 0 20px 5px rgba(240,96,96,0.3); }
    }

    .btn-secondary {
      height: 52px; padding: 0 20px;
      background: var(--surface2); color: var(--muted);
      border: 0.5px solid var(--border2); border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { color: var(--text); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn {
      height: 52px; padding: 0 24px;
      background: var(--success); color: #fff;
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 7px;
    }
    .send-btn:hover { background: #5fe0a6; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .footer-note {
      font-size: 11px; color: var(--muted); text-align: center; opacity: 0.6; padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <div class="header">
      <span class="header-title">Voice Capture</span>
      <div class="status-pill" id="statusPill">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
    </div>

    <div class="card">
      <div class="text-label">
        <i class="ti ti-book" style="font-size:14px"></i>
        Read aloud clearly
      </div>
      <div class="read-text" id="readText"></div>
    </div>

    <div class="card visualizer-card">
      <canvas id="waveCanvas"></canvas>
      <div class="vad-badge" id="vadBadge">— silent</div>
    </div>

    <div class="card progress-section">
      <div class="progress-row">
        <div class="progress-labels">
          <span class="progress-label">Voice collected</span>
          <span class="progress-value" id="voiceVal">0.0s / 10s</span>
        </div>
        <div class="track"><div class="fill fill-voice" id="voiceFill" style="width:0%"></div></div>
        <div class="segments-row" id="segmentsRow"></div>
      </div>
      <div class="progress-row">
        <div class="progress-labels">
          <span class="progress-label">Session time</span>
          <span class="progress-value" id="timeVal">0.0s / 15s</span>
        </div>
        <div class="track"><div class="fill fill-time" id="timeFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-box">
        <div class="metric-label">Volume (RMS)</div>
        <div class="metric-val" id="rmsVal">—</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Noise ratio</div>
        <div class="metric-val" id="noiseVal">—</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">ZCR</div>
        <div class="metric-val" id="zcrVal">—</div>
      </div>
    </div>

    <div class="alert-box hidden" id="alertBox">
      <i class="ti ti-info-circle"></i>
      <span id="alertMsg"></span>
    </div>

    <div class="controls">
      <button class="btn-primary" id="recBtn">
        <i class="ti ti-microphone"></i>
        Start Recording
      </button>
      <button class="btn-secondary" id="resetBtn" disabled>Reset</button>
      <button class="send-btn" id="sendBtn" disabled>
        <i class="ti ti-send"></i>
        Send
      </button>
    </div>

    <p class="footer-note">Voice activity detection · Fan/noise rejection · Min 10s clean speech required</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
